<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" fill="var(--surface-sunken, #07090c)" rx="14"/>
  <!-- Agent box -->
  <rect x="40" y="60" width="120" height="80" rx="10" fill="var(--brand, #5879fb)" opacity="0.85"/>
  <text x="100" y="88" text-anchor="middle" fill="#fff" font-family="monospace" font-size="14" font-weight="600">Agent</text>
  <text x="100" y="106" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">policy π(a|s)</text>
  <text x="100" y="122" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">value function</text>
  <!-- Environment box -->
  <rect x="240" y="60" width="120" height="80" rx="10" fill="var(--success, #16a36b)" opacity="0.5"/>
  <text x="300" y="94" text-anchor="middle" fill="var(--text-strong, #ffffff)" font-family="monospace" font-size="14" font-weight="600">Environment</text>
  <text x="300" y="112" text-anchor="middle" fill="var(--text-strong, #ffffff)" font-family="monospace" font-size="10">dynamics P(s'|s,a)</text>
  <!-- Action arrow: Agent → Environment -->
  <line x1="160" y1="80" x2="240" y2="80" stroke="var(--amber, #f5a623)" stroke-width="2"/>
  <text x="200" y="72" text-anchor="middle" fill="var(--amber, #f5a623)" font-family="monospace" font-size="11" font-weight="600">action a</text>
  <!-- Reward + next state arrow: Environment → Agent -->
  <line x1="240" y1="120" x2="160" y2="120" stroke="var(--teal, #16a394)" stroke-width="2"/>
  <text x="200" y="140" text-anchor="middle" fill="var(--teal, #16a394)" font-family="monospace" font-size="10">reward r, next state s'</text>
  <!-- Caption -->
  <text x="200" y="186" text-anchor="middle" fill="var(--text-muted, #9aa3b2)" font-family="monospace" font-size="9">Standard RL interaction cycle</text>
</svg>
