<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" fill="none">
  <rect width="500" height="200" fill="var(--surface-sunken, #07090c)" rx="14"/>
  <!-- Decay curve -->
  <text x="60" y="30" fill="var(--text-strong, #ffffff)" font-family="monospace" font-size="11">e(s)</text>
  <!-- Time steps -->
  <rect x="80" y="60" width="60" height="40" rx="6" fill="var(--brand, #5879fb)" opacity="0.7"/>
  <text x="110" y="80" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">visit</text>
  <text x="110" y="94" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">e(s)+=1</text>

  <rect x="180" y="70" width="60" height="30" rx="6" fill="var(--amber, #f5a623)" opacity="0.6"/>
  <text x="210" y="90" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">×γλ</text>

  <rect x="280" y="80" width="60" height="30" rx="6" fill="var(--amber, #f5a623)" opacity="0.5"/>
  <text x="310" y="100" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">×γλ</text>

  <rect x="380" y="90" width="60" height="30" rx="6" fill="var(--amber, #f5a623)" opacity="0.4"/>
  <text x="410" y="110" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">×γλ</text>

  <!-- Arrows between steps -->
  <line x1="140" y1="80" x2="180" y2="85" stroke="var(--border-default, #343a48)" stroke-width="1.5"/>
  <line x1="240" y1="85" x2="280" y2="95" stroke="var(--border-default, #343a48)" stroke-width="1.5"/>
  <line x1="340" y1="95" x2="380" y2="105" stroke="var(--border-default, #343a48)" stroke-width="1.5"/>

  <!-- Decay label -->
  <text x="250" y="155" text-anchor="middle" fill="var(--text-muted, #9aa3b2)" font-family="monospace" font-size="9">Each time step: e(s) ← γλ · e(s); on visit: e(s) ← e(s) + 1</text>
  <text x="250" y="178" text-anchor="middle" fill="var(--text-muted, #9aa3b2)" font-family="monospace" font-size="9">TD error δ flows backward through trace e(s) weighted by step</text>
</svg>
