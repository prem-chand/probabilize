<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <rect width="400" height="240" fill="var(--surface-sunken, #07090c)" rx="14"/>
  <!-- Root s -->
  <rect x="160" y="16" width="80" height="32" rx="6" fill="var(--brand, #5879fb)" opacity="0.85"/>
  <text x="200" y="36" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="600">s</text>
  <!-- Action a -->
  <rect x="160" y="72" width="80" height="28" rx="6" fill="var(--amber, #f5a623)" opacity="0.8"/>
  <text x="200" y="90" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">a</text>
  <line x1="200" y1="48" x2="200" y2="72" stroke="var(--border-default, #343a48)" stroke-width="1.5"/>
  <!-- s', r -->
  <rect x="120" y="120" width="160" height="32" rx="6" fill="var(--brand-subtle, #15245f)" opacity="0.6"/>
  <text x="200" y="140" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">s', r</text>
  <line x1="200" y1="100" x2="200" y2="120" stroke="var(--border-default, #343a48)" stroke-width="1.5"/>
  <!-- TD target box -->
  <rect x="100" y="172" width="200" height="40" rx="8" fill="var(--success, #16a36b)" opacity="0.15" stroke="var(--success, #16a36b)" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="200" y="192" text-anchor="middle" fill="var(--text-strong, #ffffff)" font-family="monospace" font-size="10">TD target = r + γV(s')</text>
  <line x1="200" y1="152" x2="200" y2="172" stroke="var(--border-subtle, #21262f)" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- Caption -->
  <text x="200" y="228" text-anchor="middle" fill="var(--text-muted, #9aa3b2)" font-family="monospace" font-size="9">TD(0): one-step bootstrapping — r + γV(s')</text>
</svg>
